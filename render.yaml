services:
  - type: web
    name: jtec-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn JTEC.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false          # você vai preencher no painel
      - key: ALLOWED_HOSTS
        sync: false          # ex: jtec-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: "https://jotatec.netlify.app"
